<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Vault</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&display=swap" rel="stylesheet">

  <link rel="preload" as="image" href="https://iili.io/q0QEQWJ.jpg">
  <link rel="preload" as="image" href="https://iili.io/q0QEUlV.jpg">
  <link rel="preload" as="image" href="https://iili.io/q0QE6R1.jpg">
  <link rel="preload" as="image" href="https://iili.io/q0Q1b99.jpg">

  <style>
      /* GLOBAL */
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: white;
  overflow-x: hidden;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 70px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 24px;
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(12px);
  z-index: 2000;
  box-sizing: border-box;
}

.logo {
  display: flex;
  flex-direction: column;
  font-family: 'Playfair Display', serif;
  font-size: 22px;
}

.sub-text {
  font-size: 11px;
  opacity: 0.7;
  letter-spacing: 2px;
}

.mixed-name {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* COUNTER */
.counter {
  margin-top: 70px;
  text-align: center;
  padding: 8px 0;
  font-size: 14px;
  background: rgba(255, 255, 255, 0.05);
}

/* HERO */
.hero {
  width: 100%;
  aspect-ratio: 21 / 9;
  max-height: 600px;
  overflow: hidden;
  position: relative;
}

.slider {
  position: relative;
  width: 100%;
  height: 100%;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  opacity: 0;
  transition: opacity 1s ease;
}

.slide.active {
  opacity: 1;
  z-index: 2;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  filter: brightness(75%);
}

.overlay {
  position: absolute;
  bottom: 30px;
  left: 30px;
  background: rgba(0, 0, 0, 0.4);
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 14px;
}

/* TITLE */
.section-title {
  text-align: center;
  margin: 50px 0 30px;
}

.section-title span {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  letter-spacing: 2px;
}

/* MASONRY GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 8px;
}

@media (min-width: 768px) {
  .gallery {
    grid-template-columns: repeat(5, 1fr);
  }
}

.box {
  border-radius: 18px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}

.box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.35s ease;
}

.box:hover img {
  transform: scale(1.05);
}

.box:nth-child(3n) img { aspect-ratio: 3/4; }
.box:nth-child(4n) img { aspect-ratio: 4/5; }
.box:nth-child(5n) img { aspect-ratio: 1/1; }
.box:nth-child(2n) img { aspect-ratio: 4/6; }

.photo-title {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 14px;
  font-size: 14px;
  color: white;
  background: linear-gradient(to top, rgba(0, 0, 0, 0.65), transparent);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.box:hover .photo-title {
  opacity: 1;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 3000;
}

.modal-content {
  background: #111;
  width: 90%;
  max-width: 1000px;
  max-height: 90vh;
  overflow-y: auto;
  border-radius: 15px;
  display: flex;
}

.modal-image {
  flex: 1;
}

.modal-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.modal-details {
  flex: 1;
  padding: 30px;
  position: relative;
}

.close {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 28px;
  cursor: pointer;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  background: #ff69b4;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

@media (max-width: 768px) {
  .modal-content {
    flex-direction: column;
  }
}

  </style>
</head>

<body>
  <nav class="navbar">
    <div class="logo">
      Love Vault
      <span class="sub-text">Since 23 • 09 • 2019</span>
    </div>
    <div class="mixed-name">
      ANIDIRA 🤍
    </div>
  </nav>

  <div class="counter" id="relationshipCounter"></div>

  <section class="hero">
    <div class="slider">
      <div class="slide active">
        <img src="https://iili.io/q0QEQWJ.jpg" alt="The Bench Where Time Paused">
        <div class="overlay">🌅 The Bench Where Time Paused</div>
      </div>
      <div class="slide">
        <img src="https://iili.io/q0QEUlV.jpg" alt="Hold Tight, The Journey is Ours">
        <div class="overlay">🤍 Hold Tight, The Journey is Ours</div>
      </div>
      <div class="slide">
        <img src="https://iili.io/q0QE6R1.jpg" alt="ANIDIRA">
        <div class="overlay">💞 ANIDIRA</div>
      </div>
      <div class="slide">
        <img src="https://iili.io/q0Q1b99.jpg" alt="Sealed with a Kiss">
        <div class="overlay">💋 Sealed with a Kiss</div>
      </div>
    </div>
  </section>

  <h2 class="section-title">
    <span>------ Our Memories ------</span>
  </h2>

  <section class="gallery" id="gallery"></section>

  <div class="modal" id="modal" onclick="outsideClick(event)">
    <div class="modal-content">
      <div class="modal-image">
        <img id="modalImg" alt="Memory">
      </div>
      <div class="modal-details">
        <span class="close" onclick="closeModal()">×</span>
        <h2 id="modalTitle"></h2>
        <p id="modalDate"></p>
        <p id="modalDesc"></p>
        <button onclick="downloadPhoto()" id="downloadBtn">
          Download
        </button>
      </div>
    </div>
  </div>

  <script>
      
      /* RELATIONSHIP COUNTER */
function updateCounter() {
  const startDate = new Date(2019, 8, 23);
  const now = new Date();

  let years = now.getFullYear() - startDate.getFullYear();
  let months = now.getMonth() - startDate.getMonth();
  let days = now.getDate() - startDate.getDate();

  if (days < 0) {
    months--;
    const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
    days += prevMonth.getDate();
  }

  if (months < 0) {
    years--;
    months += 12;
  }

  document.getElementById("relationshipCounter").innerText = 
    `❤️ Together for ${years} Years, ${months} Months, ${days} Days`;
}

updateCounter();

/* HERO SLIDER */
let index = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(i) {
  slides.forEach(s => s.classList.remove("active"));
  slides[i].classList.add("active");
}

setInterval(() => {
  index = (index + 1) % slides.length;
  showSlide(index);
}, 5000);

/* TOUCH SWIPE */
let startX = 0;
let endX = 0;
const slider = document.querySelector(".slider");

slider.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

slider.addEventListener("touchmove", e => {
  endX = e.touches[0].clientX;
});

slider.addEventListener("touchend", () => {
  let diff = startX - endX;

  if (diff > 50) {
    index = (index + 1) % slides.length;
    showSlide(index);
  }

  if (diff < -50) {
    index = (index - 1 + slides.length) % slides.length;
    showSlide(index);
  }
});

/* GALLERY DATA */
const images = [
  { src: "https://iili.io/qqqpfEJ.jpg", title: "First Coffee Date ☕", desc: "The day we talked for hours." },
  { src: "https://iili.io/qqqpn7p.jpg", title: "Unexpected Selfie 📸", desc: "A random moment that became special." },
  { src: "https://iili.io/qqqpokN.jpg", title: "Golden Hour 🌅", desc: "Watching sunset together." },
  { src: "https://iili.io/qqqpuQn.jpg", title: "Laughing Together 😂", desc: "One of our happiest days." },
  { src: "https://iili.io/qqqpRBs.jpg", title: "Little Adventure 🌍", desc: "Exploring new places together." },
  { src: "https://iili.io/qqqpMQe.jpg", title: "Night Walk 🌙", desc: "Endless conversations." },
  { src: "https://iili.io/qqqpcYl.jpg", title: "Sweet Surprise 🎁", desc: "Small moment, big happiness." },
  { src: "https://iili.io/qqqyd8l.jpg", title: "Favorite Place 🏞", desc: "Memories we love." }
];

const gallery = document.getElementById("gallery");

images.forEach((item, i) => {
  const div = document.createElement("div");
  div.className = "box";

  div.innerHTML = `
    <img src="${item.src}" loading="lazy" alt="${item.title}">
    <div class="photo-title">${item.title}</div>
  `;

  div.onclick = () => openModal(i);
  gallery.appendChild(div);
});

/* MODAL */
let currentImage = "";

function openModal(i) {
  currentImage = images[i].src;

  document.getElementById("modalImg").src = currentImage;
  document.getElementById("modalTitle").innerText = images[i].title;
  document.getElementById("modalDesc").innerText = images[i].desc;
  document.getElementById("modalDate").innerText = "A Special Moment 🤍";

  document.getElementById("modal").style.display = "flex";
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  document.body.style.overflow = "auto";
}

function outsideClick(e) {
  if (e.target.classList.contains("modal")) {
    closeModal();
  }
}

/* DOWNLOAD */
async function downloadPhoto() {
  const btn = document.getElementById("downloadBtn");
  btn.innerText = "Downloading...";

  try {
    const response = await fetch(currentImage);
    const blob = await response.blob();
    const url = window.URL.createObjectURL(blob);

    const link = document.createElement("a");
    link.href = url;
    link.download = "LoveVault_Memory.jpg";

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    window.URL.revokeObjectURL(url);
    btn.innerText = "Downloaded!";
  } catch {
    btn.innerText = "Error";
  }

  setTimeout(() => {
    btn.innerText = "Download";
  }, 2000);
}

  </script>
</body>
</html>
